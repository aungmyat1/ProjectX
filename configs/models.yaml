# OpenRouter multi-model routing (cost optimization ~90-95%)
# Use with ClawX / OpenClaw provider config
# Optimized for personal assistant and AI coaching performance

provider: openrouter
base_url: https://openrouter.ai/api/v1

models:
  default: qwen/qwen3.5-9b    # Ultra-cheap general reasoning ($0.05 input, $0.15 output)
  fast: google/gemini-flash-1.5  # Fast responses (already optimized)
  coding: deepseek/deepseek-chat # Coding tasks (already optimized)
  analysis: qwen/qwen3.5-9b     # Analysis for coaching sessions (cost-effective reasoning)
  assistant: google/gemini-flash-1.5  # Dedicated fast model for personal assistant tasks
  coach: qwen/qwen3.5-9b       # Dedicated model for AI coaching (balanced performance/cost)
